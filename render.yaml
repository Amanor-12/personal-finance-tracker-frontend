services:
  - type: web
    name: flowledger-api
    env: node
    rootDir: .
    buildCommand: npm --prefix backend install && npm --prefix frontend install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: high
      - key: AI_REQUEST_TIMEOUT_MS
        value: 25000
      - key: AI_MAX_OUTPUT_TOKENS
        value: 1400
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: LEDGR_STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: LEDGR_STRIPE_PRICE_PREMIUM_ANNUAL
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_MODE
        value: test
