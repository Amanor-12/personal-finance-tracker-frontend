services:
  - type: web
    name: flowledger-api
    env: node
    rootDir: .
    buildCommand: npm --prefix backend install && npm --prefix frontend install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: LEDGR_STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: LEDGR_STRIPE_PRICE_PREMIUM_ANNUAL
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_MODE
        value: test
